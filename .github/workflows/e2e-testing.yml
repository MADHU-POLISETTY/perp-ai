name: Prep-AI E2E Automation & Verification CI/CD

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: |
          npm ci || npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Test Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest selenium Appium-Python-Client openpyxl webdriver-manager
          fi

      - name: Install Google Chrome Browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Ensure Appium is installed
        run: |
          python -c "import appium" 2>/dev/null || pip install Appium-Python-Client

      - name: Start React Frontend Server
        run: |
          npm run dev > frontend.log 2>&1 &
          FRONTEND_PID=$!
          echo "Frontend PID: $FRONTEND_PID"
          echo "Waiting for frontend dev server to start..."
          sleep 5
          
          # Wait-on port 3000 (standard for local dev) or 5173 (Vite default)
          for i in {1..12}; do
            if nc -z localhost 3000 2>/dev/null; then
              echo "✓ Frontend server detected on http://localhost:3000"
              npx wait-on http://localhost:3000 --timeout 60000
              break
            elif nc -z localhost 5173 2>/dev/null; then
              echo "✓ Frontend server detected on http://localhost:5173"
              npx wait-on http://localhost:5173 --timeout 60000
              break
            else
              echo "Waiting for frontend server... (attempt $i/12)"
              sleep 5
            fi
          done

      - name: Build Android Debug APK
        continue-on-error: true
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          fi

      - name: Setup Appium and UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium --log appium.log &
          sleep 5

      - name: Run E2E Test Suite and Capture Logs
        run: |
          python tests/run_tests.py 2>&1 | tee tests/test_run.log

      - name: Generate Dashboard Quality Summary
        if: always()
        run: |
          python appium-framework/github-actions/generate_dashboard.py

      - name: Prepare Deployment Directory
        if: always()
        run: |
          mkdir -p public-pages
          if [ -f tests/test_report.html ]; then
            cp tests/test_report.html public-pages/index.html
          fi
          if [ -f tests/test_report.xlsx ]; then
            cp tests/test_report.xlsx public-pages/
          fi
          if [ -d "tests/screenshots" ]; then
            cp -r tests/screenshots public-pages/
          fi

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prep-AI-E2E-Test-Reports
          path: |
            tests/test_report.html
            tests/test_report.xlsx
            tests/test_run.log
            frontend.log
            appium.log
            tests/screenshots/
          retention-days: 14

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-pages
          force_orphan: true
